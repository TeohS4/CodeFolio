<div class="customer-container">
  <!-- HEADER -->
  <div class="header">
    <h2>Customers List</h2>
    <button mat-raised-button color="primary" (click)="openDialog()">
      + Add Customer
    </button>
  </div>
  <!-- Table -->
  <div class="table-wrapper mat-elevation-z8">
    <table mat-table [dataSource]="customers" class="full-table">
      <!-- ID -->
      <ng-container matColumnDef="id">
        <th mat-header-cell *matHeaderCellDef> ID </th>
        <td mat-cell *matCellDef="let c"> {{ c.id }} </td>
      </ng-container>
      <!-- Name -->
      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef> Name </th>
        <td mat-cell *matCellDef="let c"> {{ c.name }} </td>
      </ng-container>
      <!-- Email -->
      <ng-container matColumnDef="email">
        <th mat-header-cell *matHeaderCellDef> Email </th>
        <td mat-cell *matCellDef="let c"> {{ c.email }} </td>
      </ng-container>
      <!-- PHONE -->
      <ng-container matColumnDef="phone">
        <th mat-header-cell *matHeaderCellDef> Phone </th>
        <td mat-cell *matCellDef="let c"> {{ c.phone }} </td>
      </ng-container>
      <!-- Address -->
      <ng-container matColumnDef="address">
        <th mat-header-cell *matHeaderCellDef> Address </th>
        <td mat-cell *matCellDef="let c" class="mat-column-address"> {{ c.address }} </td>
      </ng-container>
      <!-- ACTIONS -->
      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef> Actions </th>
        <td mat-cell *matCellDef="let c" class="actions">
          <button mat-button color="accent" (click)="openDialog(c)">Edit</button>
          <button mat-button color="warn" (click)="delete(c.id)">Delete</button>
        </td>
      </ng-container>

      <!-- HEADER ROW -->
      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>

      <!-- DATA ROW -->
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>
  </div>
</div>

<!-- DIALOG -->
<ng-template #customerDialog>
  <h2 mat-dialog-title>{{ model.id ? 'Edit Customer' : 'Add Customer' }}</h2>

  <mat-dialog-content [formGroup]="form">
    <mat-form-field appearance="fill" class="full-width">
      <mat-label>Name</mat-label>
      <input matInput formControlName="name">
    </mat-form-field>

    <mat-form-field appearance="fill" class="full-width">
      <mat-label>Email</mat-label>
      <input matInput formControlName="email">
    </mat-form-field>

    <mat-form-field appearance="fill" class="full-width">
      <mat-label>Phone</mat-label>
      <input matInput formControlName="phone">
    </mat-form-field>

    <mat-form-field appearance="fill" class="full-width">
      <mat-label>Address</mat-label>
      <input matInput formControlName="address">
    </mat-form-field>
  </mat-dialog-content>

  <mat-dialog-actions align="end">
    <button mat-button mat-dialog-close>Cancel</button>
    <button mat-raised-button color="primary" (click)="save()">Save</button>
  </mat-dialog-actions>
</ng-template>
