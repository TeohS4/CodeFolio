<div class="contact-container">
  <mat-card class="contact-card grid-container">
    
    <!-- Left Column: Map + Info -->
    <div class="left-column">
      <h2>Find Us At</h2>

      <!-- Business Info -->
      <div class="business-info">
        <p><strong>Address:</strong> 123 Main Street, George Town, Penang</p>
        <p><strong>Phone:</strong> +60124567288</p>
        <p><strong>Email:</strong> info@company.com</p>
        <p><strong>Business Hours:</strong> Mon-Fri 9am - 6pm</p>
      </div>

      <!-- Map -->
      <div class="map-container">
        <iframe 
          src="https://www.google.com/maps?q=5.4141,100.3288&z=15&output=embed" 
          width="100%" 
          height="250" 
          style="border:0;" 
          allowfullscreen="" 
          loading="lazy">
        </iframe>
      </div>
    </div>

    <!-- Right Column: Contact Form -->
    <div class="right-column">
      <h2>Contact Us</h2>
      <form [formGroup]="contactForm" (ngSubmit)="onSubmit()">

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Name</mat-label>
          <input matInput formControlName="name">
          <mat-error *ngIf="contactForm.get('name')?.invalid && submitted">Name is required</mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Email</mat-label>
          <input matInput formControlName="email">
          <mat-error *ngIf="contactForm.get('email')?.invalid && submitted">Valid email required</mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Subject</mat-label>
          <input matInput formControlName="subject">
          <mat-error *ngIf="contactForm.get('subject')?.invalid && submitted">Subject is required</mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Message</mat-label>
          <textarea matInput formControlName="message" rows="6"></textarea>
          <mat-error *ngIf="contactForm.get('message')?.invalid && submitted">Message is required</mat-error>
        </mat-form-field>

        <button mat-raised-button color="primary" class="full-width" type="submit">Send Message</button>
      </form>
    </div>

  </mat-card>
</div>
