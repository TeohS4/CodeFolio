<div class="analyzer-container">
  <div class="mb-4">
    <h2 class="fw-bold text-white mb-1">Face Analyzer</h2>
    <p class="text-secondary small">Real-time Face Recognition that determine your age, gender, and mood</p>
    <div class="d-flex justify-content-center w-100">
      <button mat-raised-button [color]="isCameraOn ? 'warn' : 'primary'" (click)="toggleCamera()"
        class="mt-2 px-4 rounded-pill">
        {{ isCameraOn ? 'Turn Off Camera' : 'Start Recognition' }}
      </button>
    </div>
  </div>
  <br>
  <div class="analysis-layout">
    <div class="video-frame-card" [class.d-none]="!isCameraOn">
      <div class="canvas-stack">
        <video #videoPlayer autoplay muted></video>
        <canvas #overlayCanvas></canvas>
      </div>
    </div>
    <div class="stats-bar" *ngIf="isCameraOn && stats" [@fadeIn]>
      Age: <span class="stat-value">{{ stats.age }}</span>
      Gender: <span class="stat-value">{{ stats.gender | titlecase }}</span>
      Mood: <span class="stat-value mood" [ngClass]="stats.mood.toLowerCase()">
        {{ stats.mood | titlecase }}
      </span>
    </div>
  </div>
</div>
