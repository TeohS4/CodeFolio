<div class="dashboard">
  <h1>ERP Dashboard Overview</h1>

  <div class="cards">
    <div class="card">
      <h3>Products</h3>
      <p>{{ products.length }}</p>
    </div>

    <div class="card">
      <h3>Orders</h3>
      <p>{{ orders.length }}</p>
    </div>

    <div class="card">
      <h3>Customers</h3>
      <p>{{ customers.length }}</p>
    </div>

    <div class="card">
      <h3>Revenue</h3>
      <p>RM {{ totalRevenue | number:'1.2-2' }}</p>
    </div>
  </div>

  <div class="charts">
    <div class="card">
      <div class="chart-container">
        <canvas id="ordersChart"></canvas>
      </div>
    </div>
    <div class="card">
      <div class="chart-container">
        <canvas id="productsChart"></canvas>
      </div>
    </div>

    <div class="card">
      <div class="chart-container">
        <h3>Inventory Stock Overview</h3>
        <canvas id="stockChart"></canvas>
      </div>
    </div>

    <div class="card">
      <div class="chart-container">
        <h3>Category Overview</h3>
        <canvas id="categoryChart"></canvas>
      </div>
    </div>

  </div>
</div>
